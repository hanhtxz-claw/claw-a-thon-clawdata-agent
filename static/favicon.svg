<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- brand gradient rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- antenna -->
  <line x1="16" y1="4" x2="16" y2="8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="3.4" r="1.8" fill="#fff"/>
  <!-- robot head -->
  <rect x="6" y="8" width="20" height="15" rx="4" fill="#fff"/>
  <!-- eyes -->
  <circle cx="12" cy="14.5" r="2.4" fill="#6366f1"/>
  <circle cx="20" cy="14.5" r="2.4" fill="#6366f1"/>
  <circle cx="12.9" cy="13.6" r="0.7" fill="#fff"/>
  <circle cx="20.9" cy="13.6" r="0.7" fill="#fff"/>
  <!-- smile -->
  <path d="M10.5 18.5 Q16 22.5 21.5 18.5" stroke="#6366f1" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- ear nubs -->
  <rect x="3.4" y="13" width="2.6" height="6" rx="1.3" fill="#fff" opacity="0.85"/>
  <rect x="26" y="13" width="2.6" height="6" rx="1.3" fill="#fff" opacity="0.85"/>
</svg>
